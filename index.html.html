        style="flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:600;transition:all 0.15s;background:var(--accent);color:white;display:inline-flex;align-items:center;justify-content:center;gap:6px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Detalhes
      </button>
      <button id="ttab-notes" onclick="switchTaskTab('notes')"
        style="flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:600;transition:all 0.15s;background:transparent;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;gap:6px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Anotações / Briefing
        ${x.notes ? '<span style="width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;"></span>' : ''}
      </button>
    </div>

    <div class="modal-body" id="ttab-panel-details">
      <div class="form-group">
        <label class="form-label">Título</label>
        <input class="form-input" id="t-title" value="${escapeAttr(x.title)}" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="t-status">
          ${BOARD_COLUMNS.map(col=>`<option value="${col.id}" ${(x.status||'todo')===col.id?'selected':''}>${col.name}</option>`).join('')}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:10px;">
        <div class="form-group">
          <label class="form-label">Data de entrega</label>
          <input type="date" class="form-input" id="t-date" value="${x.date||''}">
        </div>
        <div class="form-group">
          <label class="form-label">Hora</label>
          <input type="time" class="form-input" id="t-time" value="${x.time||''}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Prioridade</label>
        <select class="form-select" id="t-priority">
          <option value="low" ${x.priority==='low'?'selected':''}>🟢 Baixa</option>
          <option value="med" ${x.priority==='med'?'selected':''}>🟡 Média</option>
          <option value="high" ${x.priority==='high'?'selected':''}>🔴 Alta</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Projeto (opcional)</label>
        <select class="form-select" id="t-project">
          <option value="">Sem projeto</option>
          ${state.focus.projects.map(p=>`<option value="${p.id}" ${x.project===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">XP por concluir</label>
        <input type="number" class="form-input" id="t-xp" value="${x.xp||10}" min="1">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveTask('${id||''}')">Salvar</button>
      </div>
    </div>

    <div class="modal-body" id="ttab-panel-notes" style="display:none;">
      <div class="form-group" style="flex:1;">
        <label class="form-label" style="display:flex;align-items:center;gap:8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Briefing / Anotações
        </label>
        <textarea class="form-textarea" id="t-notes" placeholder="Cole o briefing, links, referências, observações do cliente..." style="min-height:260px;font-size:13px;line-height:1.6;resize:vertical;">${escapeHtml(x.notes||'')}</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveTask('${id||''}')">Salvar</button>
      </div>
    </div>
  `);
}

function switchTaskTab(tab) {
  const isDetails = tab === 'details';
  document.getElementById('ttab-panel-details').style.display = isDetails ? 'flex' : 'none';
  document.getElementById('ttab-panel-notes').style.display  = isDetails ? 'none'  : 'flex';
  const btnD = document.getElementById('ttab-details');
  const btnN = document.getElementById('ttab-notes');
  btnD.style.background = isDetails ? 'var(--accent)' : 'transparent';
  btnD.style.color      = isDetails ? 'white' : 'var(--muted)';
  btnN.style.background = isDetails ? 'transparent' : 'var(--accent)';
  btnN.style.color      = isDetails ? 'var(--muted)' : 'white';
}
function saveTask(id){
  const title=document.getElementById('t-title').value.trim();
  if (!title) return toast('Título obrigatório');
  const status=document.getElementById('t-status').value;
  const notesEl=document.getElementById('t-notes');
  const data={
    title,
    date:document.getElementById('t-date').value,
    time:document.getElementById('t-time').value,
    priority:document.getElementById('t-priority').value,
    project:document.getElementById('t-project').value,
    xp:parseInt(document.getElementById('t-xp').value)||10,
    status,
    done: status==='done',
    notes: notesEl ? notesEl.value.trim() : '',
  };
  if (id) Object.assign(state.tasks.find(x=>x.id===id), data);
  else state.tasks.push({ id:uid(), ...data, createdAt:Date.now() });
  saveState(); closeModal(); render();
  toast(id?'Atualizada':'Tarefa criada');
}
function formatDate(s){
  if (!s) return '-';
  const [y,m,d]=s.split('-');
  return `${d}/${m}/${y}`;
}

/* ====================
   GOALS
   ==================== */
let goalTab='active';
function renderGoals(){
  const filter = goalTab==='active' ? g=>!g.done && !g.paused : goalTab==='done' ? g=>g.done : g=>g.paused;
  const list=state.goals.filter(filter);
  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
      <button class="btn btn-primary" onclick="openGoalModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova Meta
      </button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:18px;">
      <button class="btn ${goalTab==='active'?'btn-primary':'btn-ghost'}" onclick="setGoalTab('active')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/></svg>Ativas</button>
      <button class="btn ${goalTab==='done'?'btn-primary':'btn-ghost'}" onclick="setGoalTab('done')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>Concluídas</button>
      <button class="btn ${goalTab==='paused'?'btn-primary':'btn-ghost'}" onclick="setGoalTab('paused')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>Pausadas</button>
    </div>
    ${list.length===0 ? '<div class="card">' + emptyState('target','Nenhuma meta '+(goalTab==='active'?'ativa':goalTab==='done'?'concluída':'pausada'),'Defina objetivos e acompanhe o progresso.','<button class="btn btn-ghost" onclick="openGoalModal()" style="margin-top:14px;">+ Criar meta</button>') + '</div>' : list.map(goalCard).join('')}
  `;
}
function setGoalTab(t){ goalTab=t; render(); }
function goalCard(g){
  const pct = Math.min(100, Math.round(g.current/g.target*100));
  const daysLeft = g.deadline ? Math.ceil((new Date(g.deadline)-new Date())/86400000) : null;
  return `<div class="goal-card">
    <div class="goal-head">
      <span class="goal-icon">${g.icon||'🎯'}</span>
      <div style="flex:1;">
        <div class="goal-title">${escapeHtml(g.title)}</div>
        <div class="goal-deadline">${g.deadline ? (daysLeft>=0 ? daysLeft+' dias restantes' : 'Vencida há '+(-daysLeft)+' dias') : 'Sem prazo'}</div>
      </div>
      <div class="item-actions">
        <button class="item-action" onclick="updateGoalProgress('${g.id}')" title="Atualizar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button class="item-action" onclick="toggleGoalPause('${g.id}')" title="Pausar/Retomar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <button class="item-action" onclick="openGoalModal('${g.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="item-action danger" onclick="deleteGoal('${g.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/></svg></button>
      </div>
    </div>
    <div class="progress green"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="goal-progress-info">
      <span><strong>${g.current}</strong> / ${g.target} ${g.unit||''}</span>
      <span><strong>${pct}%</strong></span>
    </div>
  </div>`;
}
function openGoalModal(id){
  const g=id?state.goals.find(x=>x.id===id):{ title:'',target:100,current:0,unit:'',deadline:'',icon:'🎯' };
  const icons=['🎯','💰','📚','💪','🏆','🚀','🌱','✍️','🎨','💻'];
  showModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>${id?'Editar':'Nova'} Meta</h2>
    <p class="modal-sub">Defina um objetivo claro e mensurável</p>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Título</label><input class="form-input" id="g-title" value="${escapeAttr(g.title)}" placeholder="Ex: Ler 12 livros"></div>
      <div class="form-group"><label class="form-label">Ícone</label>
        <div class="icon-picker">${icons.map(ic=>`<div class="icon-pick ${ic===(g.icon||'🎯')?'selected':''}" onclick="pickIcon(this,'${ic}')">${ic}</div>`).join('')}</div>
        <input type="hidden" id="g-icon" value="${g.icon||'🎯'}">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
        <div class="form-group"><label class="form-label">Atual</label><input type="number" class="form-input" id="g-current" value="${g.current}"></div>
        <div class="form-group"><label class="form-label">Meta</label><input type="number" class="form-input" id="g-target" value="${g.target}"></div>
        <div class="form-group"><label class="form-label">Unidade</label><input class="form-input" id="g-unit" value="${escapeAttr(g.unit||'')}" placeholder="livros"></div>
      </div>
      <div class="form-group"><label class="form-label">Prazo</label><input type="date" class="form-input" id="g-deadline" value="${g.deadline||''}"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveGoal('${id||''}')">Salvar</button>
      </div>
    </div>
  `);
  document.getElementById('g-icon').addEventListener('change',()=>{});
  // patch pickIcon for goals
  document.querySelectorAll('.icon-picker .icon-pick').forEach(el=>{
    el.addEventListener('click',()=>document.getElementById('g-icon') && (document.getElementById('g-icon').value=el.textContent.trim()));
  });
}
function saveGoal(id){
  const title=document.getElementById('g-title').value.trim();
  if (!title) return toast('Título obrigatório');
  const data={
    title,
    icon:document.getElementById('g-icon').value,
    current:parseFloat(document.getElementById('g-current').value)||0,
    target:parseFloat(document.getElementById('g-target').value)||1,
    unit:document.getElementById('g-unit').value.trim(),
    deadline:document.getElementById('g-deadline').value,
  };
  if (id) Object.assign(state.goals.find(x=>x.id===id),data);
  else state.goals.push({ id:uid(), done:false, paused:false, ...data, createdAt:Date.now() });
  saveState(); closeModal(); render();
  toast(id?'Atualizada':'Meta criada');
}
function updateGoalProgress(id){
  const g=state.goals.find(x=>x.id===id);
  const v=prompt('Novo valor atual ('+g.current+' / '+g.target+' '+(g.unit||'')+'):', g.current);
  if (v===null) return;
  g.current=parseFloat(v)||0;
  if (g.current>=g.target && !g.done) {
    g.done=true; gainXP(50); gainCoins(20); toast('🏆 Meta concluída! +50 XP');
  }
  saveState(); render();
}
function toggleGoalPause(id){
  const g=state.goals.find(x=>x.id===id);
  g.paused=!g.paused;
  saveState(); render();
}
function deleteGoal(id){
  if (!confirm('Excluir meta?')) return;
  state.goals=state.goals.filter(x=>x.id!==id);
  saveState(); render();
}

/* ====================
   COURSES
   ==================== */
let courseTab='active';

function renderCourses(){
  const filter = courseTab==='active' ? c=>!c.done && !c.paused : courseTab==='done' ? c=>c.done : c=>c.paused;
  const list = state.courses.filter(filter).sort((a,b)=>{
    // Em andamento: prazo mais próximo primeiro (sem prazo no fim)
    if (courseTab==='active') {
      if (!a.deadline && !b.deadline) return 0;
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline);
    }
    return (b.createdAt||0) - (a.createdAt||0);
  });

  const totalActive = state.courses.filter(c=>!c.done && !c.paused).length;
  const totalDone = state.courses.filter(c=>c.done).length;
  const totalPaused = state.courses.filter(c=>c.paused).length;
  const totalLessons = state.courses.reduce((a,c)=>a+(c.lessonsTotal||0),0);
  const totalCompleted = state.courses.reduce((a,c)=>a+(c.lessonsDone||0),0);
  const overallPct = totalLessons ? Math.round(totalCompleted/totalLessons*100) : 0;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn ${courseTab==='active'?'btn-primary':'btn-ghost'}" onclick="setCourseTab('active')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Em andamento <span style="opacity:0.7;margin-left:4px;">${totalActive}</span>
        </button>
        <button class="btn ${courseTab==='done'?'btn-primary':'btn-ghost'}" onclick="setCourseTab('done')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Concluídos <span style="opacity:0.7;margin-left:4px;">${totalDone}</span>
        </button>
        <button class="btn ${courseTab==='paused'?'btn-primary':'btn-ghost'}" onclick="setCourseTab('paused')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pausados <span style="opacity:0.7;margin-left:4px;">${totalPaused}</span>
        </button>
      </div>
      <button class="btn btn-primary" onclick="openCourseModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Curso
      </button>
    </div>

    ${state.courses.length>0 ? `
      <div class="fin-cards" style="grid-template-columns:repeat(4,1fr);">
        <div class="card fin-card">
          <div class="fin-card-icon red-bg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <div><div class="fin-card-label">Cursos no total</div><div class="fin-card-value">${state.courses.length}</div></div>
        </div>
        <div class="card fin-card">
          <div class="fin-card-icon blue-bg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </div>
          <div><div class="fin-card-label">Aulas concluídas</div><div class="fin-card-value" style="color:var(--blue);">${totalCompleted}/${totalLessons}</div></div>
        </div>
        <div class="card fin-card">
          <div class="fin-card-icon purple-bg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div><div class="fin-card-label">Carga total</div><div class="fin-card-value" style="color:var(--purple);">${state.courses.reduce((a,c)=>a+(c.hoursTotal||0),0)}h</div></div>
        </div>
        <div class="card fin-card">
          <div class="fin-card-icon green-bg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <div><div class="fin-card-label">Progresso geral</div><div class="fin-card-value" style="color:var(--green);">${overallPct}%</div></div>
        </div>
      </div>
    ` : ''}

    ${list.length===0 ? `
      <div class="card">
        ${emptyState('book','Nenhum curso ' + (courseTab==='active'?'em andamento':courseTab==='done'?'concluído':'pausado'),
          courseTab==='active' ? 'Adicione seus cursos e acompanhe o progresso aula por aula.' : 'Cursos vão aparecer aqui quando você ' + (courseTab==='done'?'concluir':'pausar') + ' algum.',
          courseTab==='active' ? '<button class="btn btn-primary" onclick="openCourseModal()" style="margin-top:14px;"><svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;><line x1=&quot;12&quot; y1=&quot;5&quot; x2=&quot;12&quot; y2=&quot;19&quot;/><line x1=&quot;5&quot; y1=&quot;12&quot; x2=&quot;19&quot; y2=&quot;12&quot;/></svg>Adicionar curso</button>' : '')}
      </div>
    ` : list.map(courseCard).join('')}
  `;
}

function setCourseTab(t){ courseTab=t; render(); }

function courseCard(c){
  const total = c.lessonsTotal || 0;
  const done = c.lessonsDone || 0;
  const pct = total ? Math.round(done/total*100) : 0;
  const daysLeft = c.deadline ? Math.ceil((new Date(c.deadline)-new Date())/86400000) : null;
  const deadlineColor = daysLeft===null ? 'var(--muted)' : daysLeft<0 ? 'var(--red)' : daysLeft<=7 ? 'var(--yellow)' : 'var(--muted)';
  const deadlineText = c.deadline ? (daysLeft<0 ? 'Vencido há '+(-daysLeft)+'d' : daysLeft===0 ? 'Hoje' : daysLeft+'d restantes') : 'Sem prazo';
  const catColors = { 'Design':'#ff2f3d', 'IA':'#22c55e', 'Negócios':'#eab308', 'Programação':'#3b82f6', 'Marketing':'#a855f7', 'Idiomas':'#06b6d4' };
  const catColor = catColors[c.category] || '#8a8a96';

  return `
    <div class="goal-card" style="margin-bottom:14px;">
      <div class="goal-head">
        <div style="width:44px;height:44px;border-radius:10px;background:${catColor}22;border:1px solid ${catColor}55;display:grid;place-items:center;flex-shrink:0;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${catColor}" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="goal-title">${escapeHtml(c.name)}</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:4px;">
            ${c.category ? `<span style="color:${catColor};font-weight:600;">● ${escapeHtml(c.category)}</span>` : ''}
            ${c.hoursTotal ? `<span>⏱ ${c.hoursTotal}h</span>` : ''}
            <span style="color:${deadlineColor};">📅 ${deadlineText}</span>
            ${c.url ? `<a href="${escapeAttr(c.url)}" target="_blank" rel="noopener" style="color:var(--red);text-decoration:none;">🔗 Abrir</a>` : ''}
          </div>
        </div>
        <div class="item-actions">
          ${!c.done ? `<button class="item-action" onclick="toggleCoursePause('${c.id}')" title="${c.paused?'Retomar':'Pausar'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${c.paused ? '<polygon points="5 3 19 12 5 21 5 3"/>' : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'}</svg>
          </button>` : ''}
          <button class="item-action" onclick="openCourseModal('${c.id}')" title="Editar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="item-action danger" onclick="deleteCourse('${c.id}')" title="Excluir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap;">

function adjustCourseLessons(id, delta){
  const c = state.courses.find(x=>x.id===id);
  if (!c) return;
  const total = c.lessonsTotal || 0;
  const newDone = Math.max(0, Math.min(total, (c.lessonsDone||0) + delta));
  if (newDone === c.lessonsDone) return;
  const wasComplete = c.lessonsDone >= total && total>0;
  c.lessonsDone = newDone;
  if (delta > 0) {
    gainXP(5);
    gainCoins(1);
  }
  // Marcar como concluído se chegou ao total
  if (newDone >= total && total>0 && !c.done) {
    c.done = true;
    c.paused = false;
    c.completedAt = Date.now();
    gainXP(50);
    gainCoins(20);
    toast('🎓 Curso concluído! +50 XP bônus');
  } else if (newDone < total && c.done) {
    // Reabriu o curso
    c.done = false;
    c.completedAt = null;
  } else if (delta > 0) {
    toast('+5 XP • Aula concluída');
  }
  saveState();
  render();
}

function toggleCoursePause(id){
  const c = state.courses.find(x=>x.id===id);
  if (!c) return;
  c.paused = !c.paused;
  saveState();
  render();
  toast(c.paused ? 'Curso pausado' : 'Curso retomado');
}

function deleteCourse(id){
  if (!confirm('Excluir este curso? Essa ação não pode ser desfeita.')) return;
  state.courses = state.courses.filter(x=>x.id!==id);
  saveState();
  render();
  toast('Curso excluído');
}

function saveCourse(id){
  const name = document.getElementById('c-name').value.trim();
  if (!name) return toast('Nome obrigatório');
  const lessonsTotal = parseInt(document.getElementById('c-lessons-total').value) || 0;
  if (lessonsTotal < 1) return toast('Informe o total de aulas');
  let lessonsDone = parseInt(document.getElementById('c-lessons-done').value) || 0;
  lessonsDone = Math.max(0, Math.min(lessonsTotal, lessonsDone));

  const data = {
    name,
    url: document.getElementById('c-url').value.trim(),
    category: document.getElementById('c-category').value,
    hoursTotal: parseFloat(document.getElementById('c-hours').value) || 0,
    lessonsTotal,
    lessonsDone,
    deadline: document.getElementById('c-deadline').value,
    notes: document.getElementById('c-notes').value.trim(),
  };

  if (id) {
    const cur = state.courses.find(x=>x.id===id);
    Object.assign(cur, data);
    // Se completou via edição
    if (lessonsDone >= lessonsTotal && !cur.done) {
      cur.done = true;
      cur.paused = false;
      cur.completedAt = Date.now();
    } else if (lessonsDone < lessonsTotal && cur.done) {
      cur.done = false;
      cur.completedAt = null;
    }
  } else {
    const isDone = lessonsDone >= lessonsTotal;
    state.courses.push({
      id: uid(),
      done: isDone,
      paused: false,
      completedAt: isDone ? Date.now() : null,
      ...data,
      createdAt: Date.now(),
    });
  }

  saveState();
  closeModal();
  render();
  toast(id?'Curso atualizado':'Curso criado');
}

        <button class="btn btn-primary" onclick="saveTx('${id||''}')">Salvar</button>
      </div>
    </div>
  `);
  refreshTxCategories(t.category);
}
function refreshTxCategories(selId){
  const type=document.getElementById('tx-type').value;
  const sel=document.getElementById('tx-category');
  const cats=state.finance.categories.filter(c=>c.type===type);
  sel.innerHTML=cats.map(c=>`<option value="${c.id}" ${c.id===selId?'selected':''}>${escapeHtml(c.name)}</option>`).join('');
}
function saveTx(id){
  const data={
    type:document.getElementById('tx-type').value,
    desc:document.getElementById('tx-desc').value.trim()||'(sem descrição)',
    amount:parseFloat(document.getElementById('tx-amount').value)||0,
    category:document.getElementById('tx-category').value,
    account:document.getElementById('tx-account').value,
    date:document.getElementById('tx-date').value,
  };
  if (data.amount<=0) return toast('Valor inválido');
  const acc=state.finance.accounts.find(a=>a.id===data.account);
  if (id) {
    const old=state.finance.transactions.find(x=>x.id===id);
    const oldAcc=state.finance.accounts.find(a=>a.id===old.account);
    if (oldAcc) oldAcc.balance += old.type==='in'?-old.amount:+old.amount;
    Object.assign(old,data);
  } else {
    state.finance.transactions.push({ id:uid(), ...data, createdAt:Date.now() });
    gainXP(2);
  }
  if (acc) acc.balance += data.type==='in'?+data.amount:-data.amount;
  saveState(); closeModal(); render();
  toast(id?'Atualizada':'Transação salva');
}
function deleteTx(id){
  if (!confirm('Excluir transação?')) return;
  const t=state.finance.transactions.find(x=>x.id===id);
  const acc=state.finance.accounts.find(a=>a.id===t.account);
  if (acc) acc.balance += t.type==='in'?-t.amount:+t.amount;
  state.finance.transactions=state.finance.transactions.filter(x=>x.id!==id);
  saveState(); render();
}
function addAccount(){
  const name=prompt('Nome da conta:'); if (!name) return;
  const balance=parseFloat(prompt('Saldo inicial:','0'))||0;
  state.finance.accounts.push({ id:uid(), name, balance });
  saveState(); render();
}
function editAccount(id){
  const a=state.finance.accounts.find(x=>x.id===id);
  const name=prompt('Nome:',a.name); if (!name) return;
  const balance=parseFloat(prompt('Saldo:',a.balance));
  a.name=name; if (!isNaN(balance)) a.balance=balance;
  saveState(); render();
}
function deleteAccount(id){
  if (!confirm('Excluir conta? Transações vinculadas serão mantidas.')) return;
  state.finance.accounts=state.finance.accounts.filter(x=>x.id!==id);
  saveState(); render();
}
function addCategory(){
  const name=prompt('Nome da categoria:'); if (!name) return;
  const type=confirm('OK = Receita, Cancelar = Despesa') ? 'in' : 'out';
  const colors=['red','green','blue','purple','yellow','cyan','orange'];
  const color=colors[Math.floor(Math.random()*colors.length)];
  state.finance.categories.push({ id:uid(), name, type, color });
  saveState(); render();
}
function deleteCategory(id){
  if (!confirm('Excluir categoria?')) return;
  state.finance.categories=state.finance.categories.filter(x=>x.id!==id);
  saveState(); render();
}

function adjustPomo(type, delta){
  if (type==='focus') state.focus.pomoFocusMin = Math.max(5, Math.min(120, state.focus.pomoFocusMin+delta));
  else state.focus.pomoBreakMin = Math.max(1, Math.min(30, state.focus.pomoBreakMin+delta));
  if (!pomoState.running) {
    pomoState.remaining = (pomoState.mode==='focus'?state.focus.pomoFocusMin:state.focus.pomoBreakMin)*60;
  }
  saveState(); refreshPomoUI();
}
function adjustWeeklyGoal(delta){
  state.focus.weeklyGoalH = Math.max(1, state.focus.weeklyGoalH+delta);
  saveState(); render();
}
function refreshPomoUI(){
  const fEl=document.getElementById('pomo-focus-min'); if (fEl) fEl.textContent=state.focus.pomoFocusMin;
  const bEl=document.getElementById('pomo-break-min'); if (bEl) bEl.textContent=state.focus.pomoBreakMin;
  const tEl=document.getElementById('pomo-time');
  if (tEl) {
    const m=Math.floor(pomoState.remaining/60), s=pomoState.remaining%60;
    tEl.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
  const cEl=document.getElementById('pomo-circle');
  if (cEl) {
    cEl.classList.toggle('running', pomoState.running && pomoState.mode==='focus');
    cEl.classList.toggle('break', pomoState.running && pomoState.mode==='break');
  }
  const mEl=document.getElementById('pomo-mode');
  if (mEl) mEl.textContent=pomoState.mode==='focus'?'FOCO':'PAUSA';
  const btxt=document.getElementById('pomo-btn-text');
  if (btxt) btxt.textContent=pomoState.running?'Pausar':'Iniciar';
}
function togglePomo(){
  if (pomoState.running) {
    pomoState.running=false;
    clearInterval(pomoTimer);
  } else {
    pomoState.running=true;
    pomoState.startedAt=Date.now();
    pomoTimer=setInterval(tickPomo, 1000);
  }
  refreshPomoUI();
}
function tickPomo(){
  pomoState.remaining--;
  if (pomoState.remaining<=0) {
    if (pomoState.mode==='focus') {
      const min=state.focus.pomoFocusMin;
      state.focus.sessions.push({ id:uid(), date:todayKey(), min, projectId:state.focus.activeProjectId||null, ts:Date.now() });
      gainXP(min); gainCoins(Math.floor(min/5));
      toast('🎯 Sessão completa! +'+min+' XP');
      pomoState.mode='break';
      pomoState.remaining=state.focus.pomoBreakMin*60;
    } else {
      toast('☕ Pausa terminou');
      pomoState.mode='focus';
      pomoState.remaining=state.focus.pomoFocusMin*60;
    }
    pomoState.running=false;
    clearInterval(pomoTimer);
    saveState();
    if (currentPage==='focus') render();
  }
  refreshPomoUI();
}
function resetPomo(){
  pomoState.running=false; clearInterval(pomoTimer);
  pomoState.mode='focus';
  pomoState.remaining=state.focus.pomoFocusMin*60;
  refreshPomoUI();
}
function skipBreak(){
  pomoState.running=false; clearInterval(pomoTimer);
  pomoState.mode='break';
  pomoState.remaining=state.focus.pomoBreakMin*60;
  refreshPomoUI();
}
function attachPomo(){
  pomoState.remaining = (pomoState.mode==='focus'?state.focus.pomoFocusMin:state.focus.pomoBreakMin)*60;
}

function exportBackup(){
  const data=JSON.stringify(state, null, 2);
  const blob=new Blob([data], {type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='ds-forja-backup-'+todayKey()+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup exportado');
}
function importBackup(ev){
  const file=ev.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const data=JSON.parse(e.target.result);
      if (!confirm('Substituir todos os dados atuais?')) return;
      state=deepMerge(JSON.parse(JSON.stringify(DEFAULT_DATA)), data);
      saveState(); closeModal(); render();
      toast('Backup restaurado');
    } catch(err) { toast('Arquivo inválido'); }
  };
  reader.readAsText(file);
}
function resetAll(){
  if (!confirm('APAGAR todos os dados? Essa ação não pode ser desfeita.')) return;
  if (!confirm('Tem certeza absoluta?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state=JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveState(); closeModal(); render();

}
